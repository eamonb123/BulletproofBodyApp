services:
  - type: web
    name: bulletproof-body-app
    runtime: node
    plan: free
    buildCommand: cd app && npm install && npm run build
    startCommand: cd app && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: CHECKIN_SERVICE_URL
        sync: false
