services:
  - type: web
    name: bulletproof-body-app
    runtime: node
    plan: free
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
    disk:
      name: bulletproof-body-data
      mountPath: /data
      sizeGB: 1
